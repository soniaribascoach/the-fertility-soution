<li class="inline-flex items-center gap-1.5 bg-amber-100 text-amber-700 border border-amber-300 rounded-full px-3 py-1 text-xs font-medium animate-chipIn" data-term="{{ term }}">
  <span>{{ term }}</span>
  <button type="button"
    class="text-amber-400 hover:text-red-500 transition-colors text-base leading-none ml-0.5"
    hx-post="/admin/takeover/remove"
    hx-vals='{"term": "{{ term }}"}'
    hx-target="closest li"
    hx-swap="outerHTML"
    aria-label="Remove {{ term }}">
    &times;
  </button>
</li>
