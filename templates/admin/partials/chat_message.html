<div class="flex flex-col gap-2.5">
  <div class="self-end max-w-[72%] bg-violet-600 text-white rounded-xl rounded-br-sm px-4 py-2.5 text-sm leading-relaxed">
    <span class="block text-[0.7rem] font-semibold uppercase tracking-wider mb-1 text-white/80">You</span>
    <p>{{ user_message }}</p>
  </div>

  <div class="self-start max-w-[72%] bg-slate-50 border border-slate-200 rounded-xl rounded-bl-sm px-4 py-2.5 text-sm leading-relaxed">
    <span class="block text-[0.7rem] font-semibold uppercase tracking-wider mb-1 text-slate-400">AI
      {% if guardrail == "medical" %}
        <span class="bg-sky-100 text-sky-800 border border-sky-300 text-[0.68rem] font-semibold px-1.5 py-0.5 rounded-full ml-1.5 align-middle">⚕ Medical deflection</span>
      {% endif %}
      {% if booking_link_injected %}
        <span class="bg-green-100 text-green-800 border border-green-300 text-[0.68rem] font-semibold px-1.5 py-0.5 rounded-full ml-1.5 align-middle">🔗 Booking link sent</span>
      {% endif %}
    </span>
    <p>{{ ai_reply }}</p>
    {% if not guardrail %}
      <span class="inline-block text-xs font-bold mt-2 px-2 py-0.5 rounded-full {% if delta > 0 %}bg-green-100 text-green-700{% elif delta < 0 %}bg-red-100 text-red-700{% else %}bg-slate-100 text-slate-500{% endif %}">
        {{ '+' if delta > 0 else '' }}{{ delta }}
      </span>
    {% endif %}
  </div>
</div>

<span id="score-badge" hx-swap-oob="true">Score: {{ score }}</span>
