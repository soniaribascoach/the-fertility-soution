<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Fertility Admin</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo"></div>
    <h1>Welcome back</h1>
    <p class="login-subtitle">Fertility Solution Admin Panel</p>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required placeholder="Enter your password">
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
